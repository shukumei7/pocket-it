# Map connection upgrade header for WebSocket support
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP: redirect to HTTPS + serve ACME challenges
server {
    listen 80;
    listen [::]:80;
    server_name pocket-it.app www.pocket-it.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: proxy to pocket-it on port 9100
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name pocket-it.app www.pocket-it.app;

    ssl_certificate     /etc/nginx/certs/pocket-it.app.crt;
    ssl_certificate_key /etc/nginx/certs/pocket-it.app.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
