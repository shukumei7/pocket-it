---
services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: pocket-it
    environment:
      - TS_AUTHKEY=tskey-auth-REPLACE_ME
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${PWD}/tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    network_mode: "host"
    restart: unless-stopped

  nginx:
    image: nginx
    depends_on:
      - tailscale
    network_mode: "host"
    volumes:
      - ${PWD}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${PWD}/certs:/etc/nginx/certs:ro
      - ${PWD}/webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
